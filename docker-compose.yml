version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: taskmanager-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: taskmanager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d taskmanager"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./DesafioFullstack/Backend
    container_name: taskmanager-api
    ports:
      - "5000:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >
        Host=db;Port=5432;Database=taskmanager;Username=admin;Password=${DB_PASSWORD}
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      Cors__AllowedOrigins__0: "http://localhost:3000"

  frontend:
    build:
      context: ./DesafioFullstack/Frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: taskmanager-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
